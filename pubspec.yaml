name: lostandfound
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  intl: any
  shared_preferences: ^2.5.5
  flutter_riverpod: ^3.3.1
  shimmer: ^3.0.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.3
  geocoding: ^4.0.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  url_launcher: ^6.3.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/college_logo.png"
  min_sdk_android: 21
